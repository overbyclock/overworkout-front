# CI/CD Pipeline para OverWorkout Admin
# Se ejecuta en cada push y pull request

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Tests y Build (sin lint estricto)
  test-and-build:
    name: Tests y Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # Desactivamos lint estricto por ahora (problemas CRLF/LF)
      # - name: Ejecutar ESLint
      #   run: npm run lint

      - name: Ejecutar tests
        run: npm run test

      - name: Build de producción
        run: npm run build

      # Guardar el build como artifact
      - name: Subir dist como artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
